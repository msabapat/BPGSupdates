<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BPGS Blended Strategy Report</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
<style>
:root{
  --teal:#0d9488;--teal-l:#ccfbf1;--teal-d:#0f766e;
  --amber:#d97706;--amber-l:#fef3c7;
  --indigo:#4f46e5;--indigo-l:#e0e7ff;
  --red:#dc2626;--red-l:#fee2e2;
  --gray-50:#f9fafb;--gray-100:#f3f4f6;--gray-200:#e5e7eb;
  --gray-400:#9ca3af;--gray-600:#4b5563;--gray-800:#1f2937;
  --font:system-ui,-apple-system,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--gray-50);color:var(--gray-800);font-size:14px}
.hdr{background:#fff;border-bottom:2px solid var(--teal);padding:14px 24px;display:flex;align-items:center;justify-content:space-between}
.hdr h1{font-size:19px;font-weight:700;color:var(--teal-d)}
.hdr-meta{font-size:11px;color:var(--gray-600);text-align:right;line-height:1.6}
.tabs{display:flex;background:#fff;border-bottom:1px solid var(--gray-200);padding:0 24px}
.tab-btn{padding:10px 20px;border:none;background:none;cursor:pointer;font-size:14px;font-weight:600;color:var(--gray-600);border-bottom:3px solid transparent;margin-bottom:-1px;transition:all .2s}
.tab-btn.active{color:var(--teal);border-bottom-color:var(--teal)}
.wrap{max-width:1340px;margin:0 auto;padding:18px 16px}
.tp{display:none}.tp.active{display:block}
/* badges */
.rbadge{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:999px;font-weight:700;font-size:12px}
.badge-H,.badge-R{background:var(--teal-l);color:var(--teal-d)}
.badge-M,.badge-N{background:var(--amber-l);color:#92400e}
.badge-L,.badge-D{background:var(--red-l);color:var(--red)}
.bdot{width:7px;height:7px;border-radius:50%;background:currentColor}
/* cards */
.card-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.card{background:#fff;border:1px solid var(--gray-200);border-radius:10px;padding:11px 14px;flex:1;min-width:150px}
.card-lbl{font-size:10px;font-weight:700;text-transform:uppercase;color:var(--gray-400);letter-spacing:.06em;margin-bottom:4px}
.card-nm{font-size:14px;font-weight:700;margin-bottom:6px}
.srow{display:flex;justify-content:space-between;font-size:11px;margin-top:2px}
.sl{color:var(--gray-600)}.sv{font-weight:600}
.green{color:#059669}.red{color:var(--red)}.amber{color:var(--amber)}.indigo{color:var(--indigo)}
/* controls */
.ctrls{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:14px;background:#fff;padding:10px 14px;border-radius:10px;border:1px solid var(--gray-200)}
.cl{font-size:11px;font-weight:600;color:var(--gray-600)}
.bg{display:flex;gap:3px}
.pb{padding:4px 10px;border:1px solid var(--gray-200);border-radius:6px;background:#fff;cursor:pointer;font-size:12px;font-weight:600;color:var(--gray-600);transition:all .15s}
.pb.active{background:var(--teal);color:#fff;border-color:var(--teal)}
.divider{width:1px;background:var(--gray-200);height:18px}
/* section */
.sec{font-size:13px;font-weight:700;color:var(--gray-800);margin:16px 0 7px}
.sub{font-weight:400;color:var(--gray-400);font-size:11px}
/* stats table */
.st{width:100%;border-collapse:collapse;background:#fff;border-radius:10px;overflow:hidden;border:1px solid var(--gray-200);margin-bottom:18px}
.st th{background:var(--gray-100);text-align:center;padding:7px 10px;font-size:10px;font-weight:700;text-transform:uppercase;color:var(--gray-600);letter-spacing:.04em}
.st th.L{text-align:left}
.st td{padding:7px 10px;text-align:center;border-top:1px solid var(--gray-200);font-size:12px}
.st td.L{text-align:left;font-weight:600}
.st tr.sel{background:var(--teal-l)}
.st tr:hover{background:var(--gray-50)}
/* chart grid */
.cg{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
.cg1{display:grid;grid-template-columns:1fr;gap:14px;margin-bottom:18px}
.cg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:18px}
.cc{background:#fff;border:1px solid var(--gray-200);border-radius:10px;padding:14px}
.cc h3{font-size:12px;font-weight:700;margin-bottom:2px;color:var(--gray-800)}
.cc-sub{font-size:10px;color:var(--gray-400);margin-bottom:8px}
.cc canvas{max-height:520px}
.cc-wide canvas{max-height:440px}
.cc-pie canvas{max-height:240px;max-width:240px;margin:0 auto;display:block}
.zoom-hint{font-size:10px;color:var(--gray-400);margin-top:4px;text-align:right}
.reset-btn{font-size:10px;padding:2px 8px;border:1px solid var(--gray-200);border-radius:4px;
           background:#fff;cursor:pointer;color:var(--gray-600);float:right;margin-top:-20px}
/* heatmap */
.hw{overflow-x:auto;margin-bottom:18px}
.hm{border-collapse:collapse;background:#fff;border-radius:10px;overflow:hidden;border:1px solid var(--gray-200);font-size:11px}
.hm th{padding:5px 8px;text-align:center;font-weight:700;font-size:10px;background:var(--gray-100);color:var(--gray-600)}
.hm th.L{text-align:left}
.hm td{padding:5px 8px;text-align:center;font-weight:600;white-space:nowrap}
/* weight table */
.wt{width:100%;border-collapse:collapse;background:#fff;border-radius:10px;overflow:hidden;border:1px solid var(--gray-200);margin-bottom:18px}
.wt th{background:var(--gray-100);padding:7px 10px;font-size:10px;font-weight:700;text-transform:uppercase;color:var(--gray-600);text-align:center}
.wt th.L{text-align:left}
.wt td{padding:7px 10px;text-align:center;border-top:1px solid var(--gray-200);font-size:12px}
.wt td.L{text-align:left;font-weight:700}
</style>
</head>
<body>
<div class="hdr">
  <div>
    <h1>BPGS Blended Strategy Report</h1>
    <div style="font-size:11px;color:var(--gray-600);margin-top:2px">IS 2001–2021 &nbsp;|&nbsp; OOS 2022–present &nbsp;|&nbsp; T-bill risk-free &nbsp;|&nbsp; max-ret-at-vol optimizer</div>
    <div id="stamp" style="font-size:10px;color:var(--gray-400);margin-top:3px"></div>
  </div>
  <div class="hdr-meta" id="dl"></div>
</div>
<details id="params-panel" style="border:1px solid var(--gray-200);border-radius:8px;margin:8px 16px 0;padding:0;background:#fafafa">
  <summary style="padding:8px 14px;font-size:12px;font-weight:600;color:var(--gray-600);cursor:pointer;list-style:none;display:flex;align-items:center;gap:6px">
    ▶ Report Parameters &amp; Reproducibility Config

  <div id="params-body" style="padding:12px 16px 14px;font-size:11px;font-family:monospace;color:#1f2937;line-height:1.7;white-space:pre-wrap"></div>
</details>

</div>

</div>

  const rs=method==='m1'?d.roll_sharpe_m1:d.roll_sharpe_m4;
  const srs=d.spy_roll_sharpe;
  mkZoomLine(tk+'_rs',
    [{label:'Blend 12m Sharpe',data:rs.sharpe,borderColor:BLEND_CLR,borderWidth:2.5,pointRadius:0,
      fill:{target:'origin',above:'rgba(13,148,136,0.15)',below:'rgba(220,38,38,0.12)'}},
     {label:'SPY',data:srs.sharpe,borderColor:SPY_CLR,borderWidth:2,pointRadius:0,fill:false},
     {label:'Zero',data:rs.dates.map(()=>0),borderColor:'#94a3b8',borderWidth:0.8,pointRadius:0,borderDash:[4,3]}],
    rs.dates, 'Rolling 12m Sharpe', null);

  // ── Annual returns filled line chart ──────────────────────────────────────
  const ct=d.combined_table;
  const yrs=Object.keys(ct).map(Number).sort().map(String);
  const bYr=yrs.map(y=>ct[y].blend), sYr=yrs.map(y=>ct[y].spy);
  mkChart(tk+'_yrl',{type:'line',data:{labels:yrs,datasets:[
    {label:'Blend',data:bYr,borderColor:BLEND_CLR,borderWidth:2.5,pointRadius:5,pointBackgroundColor:BLEND_CLR,
     fill:{target:'origin',above:'rgba(13,148,136,0.18)',below:'rgba(220,38,38,0.15)'},tension:0.2},
    {label:'SPY',data:sYr,borderColor:SPY_CLR,borderWidth:2,pointRadius:5,pointBackgroundColor:SPY_CLR,fill:false,tension:0.2},
    {label:'Zero',data:yrs.map(()=>0),borderColor:'#94a3b8',borderWidth:0.8,pointRadius:0,borderDash:[3,3]},
  ]},options:{responsive:true,maintainAspectRatio:true,animation:false,
    interaction:{mode:'index',intersect:false},
    plugins:{legend:{position:'top',labels:{boxWidth:10,font:{size:10},usePointStyle:true}},
      zoom:{zoom:{wheel:{enabled:true},pinch:{enabled:true},mode:'x'},pan:{enabled:true,mode:'x'}}},
    scales:{x:{ticks:{font:{size:10}},grid:{display:false}},
            y:{ticks:{font:{size:10},callback:v=>((v*100).toFixed(0)+'%')},
               title:{display:true,text:'Annual Return',font:{size:10}}}}}});

  // ── Regime-by-year stacked bar (full width) ───────────────────────────────
  const rby=d.reg_by_year, regs=d.regimes;
  const years=Object.keys(rby).map(Number).sort();
  const RCLR={H:'#0d9488',M:'#d97706',L:'#dc2626',D:'#dc2626',R:'#0d9488',N:'#d97706'};
  mkChart(tk+'_rby',{type:'bar',
    data:{labels:years.map(String),datasets:regs.map(reg=>({
      label:(d.regime_labels[reg]||reg)+' ('+reg+')',
      data:years.map(y=>((rby[y]||{})[reg]||0)),
      backgroundColor:RCLR[reg]||'#999',borderRadius:2}))},
    options:{responsive:true,maintainAspectRatio:true,animation:false,
      plugins:{legend:{position:'top',labels:{boxWidth:10,font:{size:10},usePointStyle:true}}},
      scales:{
        x:{stacked:true,ticks:{font:{size:9}},grid:{display:false}},
        y:{stacked:true,ticks:{font:{size:9},callback:v=>v+'%'},max:100,
           title:{display:true,text:'% of trading days',font:{size:9}}}
      }}});

    // ── Pie charts: IS regime weights per regime (one per regime) ─────────────
  const rw=d.regime_weights;
  regs.forEach(reg=>{
    const w=rw[reg][method];
    const vals=D.assets.map(a=>Math.max(0,w[a]||0));
    const labels=D.assets.map(a=>({lv:'LV',mom:'MOM',mr:'MR',spy:'SPY',tbill:'T-Bill'}[a]));
    // filter out zeros
    const fv=[],fl=[],fc=[];
    vals.forEach((v,i)=>{if(v>0.005){fv.push(v);fl.push(labels[i]);fc.push(ACLR_PIE[i]);}});
    mkChart(tk+'_pie_'+reg,{type:'doughnut',
      data:{labels:fl,datasets:[{data:fv,backgroundColor:fc,borderWidth:2,borderColor:'#fff',hoverOffset:6}]},
      options:{responsive:true,maintainAspectRatio:true,animation:false,
        cutout:'55%',
        plugins:{legend:{position:'bottom',labels:{boxWidth:10,font:{size:10},usePointStyle:true}},
          tooltip:{callbacks:{label:ctx=>`${ctx.label}: ${(ctx.parsed*100).toFixed(1)}%`}}}}});
  });
}

// ── Tab state ─────────────────────────────────────────────────────────────────
const S={hml:{method:'m4',kelly:20,vol:100},drn:{method:'m4',kelly:125,vol:125}};
function getParam(tk){return S[tk].method==='m1'?S[tk].kelly:S[tk].vol;}

// ── Render ────────────────────────────────────────────────────────────────────
function render(tk){
  const d=D[tk], s=S[tk];
  const reg=tk==='hml'?D.current_hml:D.current_drn;
  const el=document.getElementById(tk==='hml'?'ph':'pd');
  const param=getParam(tk);
  const kBtns=D.kelly_fs.map(f=>`<button class="pb${s.method==='m1'&&s.kelly===f?' active':''}" onclick="setP('${tk}','m1',${f})">${f}%</button>`).join('');
  const vBtns=D.vol_mults.map(v=>`<button class="pb${s.method==='m4'&&s.vol===v?' active':''}" onclick="setP('${tk}','m4',${v})">${(v/100).toFixed(2)}×</button>`).join('');

  el.innerHTML=`
    <div style="display:flex;align-items:center;gap:10px;margin:10px 0 14px">
      ${badge(reg,d.regime_labels)}
      <span style="font-size:12px;color:var(--gray-400)">as of ${D.current_date}</span>
    </div>
    ${compCards(d)}
    <div class="ctrls">
      <span class="cl">Method:</span>
      <div class="bg">
        <button class="pb${s.method==='m4'?' active':''}" onclick="setM('${tk}','m4')">M4 Fixed Vol</button>
        <button class="pb${s.method==='m1'?' active':''}" onclick="setM('${tk}','m1')">M1 Kelly</button>
      </div>
      <div class="divider"></div>
      ${s.method==='m1'?`<span class="cl">Kelly Fraction:</span><div class="bg">${kBtns}</div>`
                       :`<span class="cl">Vol Multiple:</span><div class="bg">${vBtns}</div>`}
    </div>
    <div class="sec">Performance Summary <span class="sub">(Sortino uses T-bill rf)</span></div>
    ${statsTable(d,s.method,param)}
    <div class="cg1">
      <div class="cc cc-wide">
        <div style="display:flex;justify-content:space-between;align-items:baseline">
          <h3>Equity Curve <span style="font-size:10px;color:var(--gray-400);font-weight:400">(log scale, NAV starts at 1)</span></h3>
          <button class="reset-btn" onclick="resetZoom('${tk}_eq')">Reset Zoom</button>
        </div>
        <div class="cc-sub">Scroll to zoom &nbsp;·&nbsp; Drag to pan &nbsp;·&nbsp; Dashed line = IS/OOS boundary</div>
        <canvas id="${tk}_eq"></canvas>
      </div>
    </div>
    <div class="cg1">
      <div class="cc cc-wide">
        <div style="display:flex;justify-content:space-between;align-items:baseline">
          <h3>Drawdown from All-Time High</h3>
          <button class="reset-btn" onclick="resetZoom('${tk}_dd')">Reset Zoom</button>
        </div>
        <div class="cc-sub">Scroll to zoom &nbsp;·&nbsp; Drag to pan</div>
        <canvas id="${tk}_dd"></canvas>
      </div>
    </div>
    <div class="cg1">
      <div class="cc cc-wide">
        <div style="display:flex;justify-content:space-between;align-items:baseline">
          <h3>Rolling 12-Month Sharpe Ratio</h3>
          <button class="reset-btn" onclick="resetZoom('${tk}_rs')">Reset Zoom</button>
        </div>
        <div class="cc-sub">Scroll to zoom &nbsp;·&nbsp; Drag to pan</div>
        <canvas id="${tk}_rs"></canvas>
      </div>
    </div>
    <div class="sec">Regime Allocation <span class="sub">${s.method==='m1'?'M1 @ 25% Kelly':'M4 @ 1.0× vol'} — IS optimal weights per regime</span></div>
    <div class="cg3" id="${tk}_pies">
      ${d.regimes.map(reg=>`
        <div class="cc">
          <h3>${d.regime_labels[reg]||reg} Regime (${reg})
            <span style="font-size:10px;color:var(--gray-400);font-weight:400;margin-left:6px">
              Tang Sh ${d.regime_weights[reg].tang_sharpe} &nbsp;·&nbsp;
              Act Vol ${s.method==='m1'?d.regime_weights[reg].act_vol_m1:d.regime_weights[reg].act_vol_m4}%
            </span>
          </h3>
          <div class="cc-pie"><canvas id="${tk}_pie_${reg}"></canvas></div>
          <div style="text-align:center;font-size:10px;color:var(--gray-400);margin-top:4px">${d.regime_dist[reg]}% of IS days</div>
        </div>`).join('')}
    </div>
    <div class="cg1">
      <div class="cc cc-wide"><h3>Regime Mix by Year</h3><canvas id="${tk}_rby"></canvas></div>
    </div>
    <div class="cg1">
      <div class="cc cc-wide"><h3>Annual Returns — Blend vs SPY <span style="font-size:10px;color:var(--gray-400);font-weight:400">(linear scale — annual %)</span></h3><canvas id="${tk}_yrl"></canvas></div>
    </div>
    <div class="sec">Year-by-Year Returns &amp; Attribution <span class="sub">(M4 @ 1.0×, compound contribution per component)</span></div>
    ${combinedTable(d,s.method,param)}
    <div class="cg">
      <div>
        <div class="sec">Correlation Matrix <span class="sub">(IS, all assets)</span></div>
        ${corrMatrix(d)}
      </div>
      <div>
        <div class="sec">IS Regime Weights <span class="sub">${s.method==='m1'?'M1 @ 25% Kelly ref':'M4 @ 1.0× vol ref'}</span></div>
        ${weightsTable(d,s.method)}
      </div>
    </div>
  `;
  setTimeout(()=>drawCharts(tk,d,s.method,param),10);
}

function setM(tk,m){S[tk].method=m;render(tk);}
function setP(tk,m,v){S[tk].method=m;if(m==='m1')S[tk].kelly=v;else S[tk].vol=v;render(tk);}
function sw(name){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',['hml','drn'][i]===name));
  document.querySelectorAll('.tp').forEach(p=>p.classList.remove('active'));
  document.getElementById(name==='hml'?'ph':'pd').classList.add('active');
  render(name);
}

document.getElementById('dl').innerHTML=`Report: ${D.current_date}<br>Data: ${D.hml.data_start} → ${D.hml.data_end}`;
document.getElementById('stamp').innerHTML=`Generated: <b>${D.generated_at}</b> &nbsp;·&nbsp; Author: <b>${D.author}</b>`;

// ── Populate reproducibility panel ────────────────────────────────────────────
(function(){
  const c=D.config, cc=D.component_configs;
  const lines=[
    `Generated:    ${D.generated_at}`,
    `Author:       ${D.author}`,
    ``,
    `── Period ──────────────────────────────────────────────`,
    `IS:           ${c.is_period}`,
    `OOS:          ${c.oos_period}`,
    `Risk-free:    ${c.risk_free}`,
    ``,
    `── Optimizer ───────────────────────────────────────────`,
    `Method:       ${c.optimizer}`,
    `Max per risky asset: ${c.max_per_risky_asset}  (T-bill uncapped)`,
    `Kelly fractions:     ${c.kelly_fractions.map(f=>(f*100).toFixed(0)+'%').join(' / ')}`,
    `Vol multiples:       ${c.vol_multiples.map(v=>v+'×').join(' / ')}`,
    ``,
    `── HML Regime ──────────────────────────────────────────`,
    `SPY percentile window: ${c.hml_regime.window_days} trading days (3yr)`,
    `High ≥ ${c.hml_regime.high_pct}th pctl  |  Low ≤ ${c.hml_regime.low_pct}th pctl  |  Mid = rest`,
    `Causal lag: ${c.hml_regime.causal_lag_days} day`,
    ``,
    `── D/R/N Regime ────────────────────────────────────────`,
    `T = ${c.drn_regime.T*100}%  |  f = ${c.drn_regime.f}`,
    `Descent:  dd < -T  AND  du < |dd|×f`,
    `Recovery: dd < -T×f  AND  du ≥ |dd|×f`,
    `Normal:   else`,
    `Base vols: Descent ${c.drn_regime.base_vols.Descent*100}%  Normal ${c.drn_regime.base_vols.Normal*100}%  Recovery ${c.drn_regime.base_vols.Recovery*100}%`,
    `Causal lag: ${c.drn_regime.causal_lag_days} day`,
    ``,
    `── Component Configs ────────────────────────────────────`,
    `LV:   mcap_rank≤${cc.lv.max_mcap_rank}  N=${cc.lv.n_stocks}  vol_days=${cc.lv.vol_days}  fcf_min=${cc.lv.fcf_yield_min}  net_debt≤${cc.lv.net_debt_cap}  freq=${cc.lv.signal_freq}`,
    `MOM:  mcap_rank≤${cc.mom.max_mcap_rank}  N=${cc.mom.n_stocks}  signal=${cc.mom.signal}`,
    `MR:   mcap_rank≤${cc.mr.max_mcap_rank}  C=${cc.mr.n_candidates}  N=${cc.mr.n_stocks}  dv×${cc.mr.dv_multiplier}  stage1=${cc.mr.stage1_col}↓  stage2=${cc.mr.stage2_col}↑`,
    ``,
    `── Data ─────────────────────────────────────────────────`,
    `Panel:        ${c.panel_source}`,
    `Built by:     ${c.panel_built_by}`,
    `Data end:     ${D.hml.data_end}`,
  ];
  document.getElementById('params-body').textContent=lines.join('\n');
  // toggle triangle on open/close
  const det=document.getElementById('params-panel');
  det.addEventListener('toggle',()=>{
    det.querySelector('summary').textContent=(det.open?'▼':'▶')+' Report Parameters & Reproducibility Config';
  });
})();

render('hml');
</script>
</body></html>
