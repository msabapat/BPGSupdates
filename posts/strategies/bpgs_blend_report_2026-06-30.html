<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BPGS Blended Strategy Report</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
<style>
:root{
  --teal:#0d9488;--teal-l:#ccfbf1;--teal-d:#0f766e;
  --amber:#d97706;--amber-l:#fef3c7;
  --indigo:#4f46e5;--indigo-l:#e0e7ff;
  --red:#dc2626;--red-l:#fee2e2;
  --gray-50:#f9fafb;--gray-100:#f3f4f6;--gray-200:#e5e7eb;
  --gray-400:#9ca3af;--gray-600:#4b5563;--gray-800:#1f2937;
  --font:system-ui,-apple-system,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--gray-50);color:var(--gray-800);font-size:14px}
.hdr{background:#fff;border-bottom:2px solid var(--teal);padding:14px 24px;display:flex;align-items:center;justify-content:space-between}
.hdr h1{font-size:19px;font-weight:700;color:var(--teal-d)}
.hdr-meta{font-size:11px;color:var(--gray-600);text-align:right;line-height:1.6}
.tabs{display:flex;background:#fff;border-bottom:1px solid var(--gray-200);padding:0 24px}
.tab-btn{padding:10px 20px;border:none;background:none;cursor:pointer;font-size:14px;font-weight:600;color:var(--gray-600);border-bottom:3px solid transparent;margin-bottom:-1px;transition:all .2s}
.tab-btn.active{color:var(--teal);border-bottom-color:var(--teal)}
.wrap{max-width:1340px;margin:0 auto;padding:18px 16px}
.tp{display:none}.tp.active{display:block}
/* badges */
.rbadge{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:999px;font-weight:700;font-size:12px}
.badge-H,.badge-R{background:var(--teal-l);color:var(--teal-d)}
.badge-M,.badge-N{background:var(--amber-l);color:#92400e}
.badge-L,.badge-D{background:var(--red-l);color:var(--red)}
.bdot{width:7px;height:7px;border-radius:50%;background:currentColor}
/* cards */
.card-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.card{background:#fff;border:1px solid var(--gray-200);border-radius:10px;padding:11px 14px;flex:1;min-width:150px}
.card-lbl{font-size:10px;font-weight:700;text-transform:uppercase;color:var(--gray-400);letter-spacing:.06em;margin-bottom:4px}
.card-nm{font-size:14px;font-weight:700;margin-bottom:6px}
.srow{display:flex;justify-content:space-between;font-size:11px;margin-top:2px}
.sl{color:var(--gray-600)}.sv{font-weight:600}
.green{color:#059669}.red{color:var(--red)}.amber{color:var(--amber)}.indigo{color:var(--indigo)}
/* controls */
.ctrls{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:14px;background:#fff;padding:10px 14px;border-radius:10px;border:1px solid var(--gray-200)}
.cl{font-size:11px;font-weight:600;color:var(--gray-600)}
.bg{display:flex;gap:3px}
.pb{padding:4px 10px;border:1px solid var(--gray-200);border-radius:6px;background:#fff;cursor:pointer;font-size:12px;font-weight:600;color:var(--gray-600);transition:all .15s}
.pb.active{background:var(--teal);color:#fff;border-color:var(--teal)}
.divider{width:1px;background:var(--gray-200);height:18px}
/* section */
.sec{font-size:13px;font-weight:700;color:var(--gray-800);margin:16px 0 7px}
.sub{font-weight:400;color:var(--gray-400);font-size:11px}
/* stats table */
.st{width:100%;border-collapse:collapse;background:#fff;border-radius:10px;overflow:hidden;border:1px solid var(--gray-200);margin-bottom:18px}
.st th{background:var(--gray-100);text-align:center;padding:5px 8px;font-size:12px;font-weight:700;text-transform:uppercase;color:var(--gray-600);letter-spacing:.04em}
.st th.L{text-align:left}
.st td{padding:5px 8px;text-align:center;border-top:1px solid var(--gray-200);font-size:13px}
.st td.L{text-align:left;font-weight:600}
.st tr.sel{background:var(--teal-l)}
.st tr:hover{background:var(--gray-50)}
/* chart grid */
.cg{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
.cg1{display:grid;grid-template-columns:1fr;gap:14px;margin-bottom:18px}
.cg2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
.cg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:18px}
.cc{background:#fff;border:1px solid var(--gray-200);border-radius:10px;padding:14px}
.cc h3{font-size:12px;font-weight:700;margin-bottom:2px;color:var(--gray-800)}
.cc-sub{font-size:10px;color:var(--gray-400);margin-bottom:8px}
.cc canvas{max-height:520px}
.cc-wide canvas{max-height:440px}
.cc-pie canvas{max-height:240px;max-width:240px;margin:0 auto;display:block}
.zoom-hint{font-size:10px;color:var(--gray-400);margin-top:4px;text-align:right}
.reset-btn{font-size:10px;padding:2px 8px;border:1px solid var(--gray-200);border-radius:4px;
           background:#fff;cursor:pointer;color:var(--gray-600);float:right;margin-top:-20px}
/* heatmap */
.hw{overflow-x:auto;margin-bottom:18px}
.hm{border-collapse:collapse;background:#fff;border-radius:10px;overflow:hidden;border:1px solid var(--gray-200);font-size:11px}
.hm th{padding:4px 6px;text-align:center;font-weight:700;font-size:12px;background:var(--gray-100);color:var(--gray-600)}
.hm th.L{text-align:left}
.hm td{padding:3px 6px;text-align:center;font-weight:600;white-space:nowrap;font-size:12px}
/* weight table */
.wt{width:100%;border-collapse:collapse;background:#fff;border-radius:10px;overflow:hidden;border:1px solid var(--gray-200);margin-bottom:18px}
.wt th{background:var(--gray-100);padding:4px 8px;font-size:12px;font-weight:700;text-transform:uppercase;color:var(--gray-600);text-align:center}
.wt th.L{text-align:left}
.wt td{padding:3px 8px;text-align:center;border-top:1px solid var(--gray-200);font-size:12px}
.wt td.L{text-align:left;font-weight:700}
</style>
</head>

<div class="hdr">
  <div>
    <h1>BPGS Blended Strategy Report</h1>

    <div id="stamp" style="font-size:10px;color:var(--gray-400);margin-top:3px"></div>

  <div class="hdr-meta" id="dl"></div>
</div>
<details id="params-panel" style="border:1px solid var(--gray-200);border-radius:8px;margin:8px 16px 0;padding:0;background:#fafafa">

</div>

          pan:{enabled:true,mode:'x'},
        },
        tooltip:{callbacks:{
          title: items=>items[0]?.label||'',
          label: ctx=>` ${ctx.dataset.label}: ${logScale?(ctx.parsed.y).toFixed(2):ctx.formattedValue}`,
        }},
      },
      scales:{
        x:{ticks:{maxTicksLimit:10,font:{size:9}},grid:{display:false}},
        y:{type:logScale?'logarithmic':'linear',
           ticks:{font:{size:9},callback:v=>logScale?(v>=1?v.toFixed(0)+'×':v.toFixed(1)+'×'):pctScale?((v*100).toFixed(0)+'%'):v,
                 stepSize:pctScale?0.10:undefined},
           title:{display:!!yTitle,text:yTitle||'',font:{size:9}}},
      }
    }
  });
}
function resetZoom(id){if(CH[id])CH[id].resetZoom();}

// ── Stats table ───────────────────────────────────────────────────────────────

      <th colspan="5" style="background:var(--indigo-l);color:var(--indigo)">In-Sample 2001–2021</th>
      <th colspan="5" style="background:var(--teal-l);color:var(--teal-d)">Out-of-Sample 2022–</th>
    </tr><tr>
      <th class="L"></th>
      <th>CAGR</th><th>Vol</th><th>Sharpe</th><th>Sortino</th><th>MaxDD</th>
      <th>CAGR</th><th>Vol</th><th>Sharpe</th><th>Sortino</th><th>MaxDD</th>
    </tr></thead><tbody>
    ${pList.map(p=>{
      const key=`${method}_${p}`, st=d.stat_table[key];
      const lbl=method==='m1'?`${p}% Kelly`:`${(p/100).toFixed(2)}× Vol`;

      return `<tr${isSel}>

        <td>${s2(st.is.sharpe)}</td><td>${s2(st.is.sortino)}</td><td class="red">${p1(st.is.mdd)}</td>
        <td class="${pc(st.oos.cagr)}">${p1(st.oos.cagr)}</td><td>${p1(st.oos.vol)}</td>
        <td>${s2(st.oos.sharpe)}</td><td>${s2(st.oos.sortino)}</td><td class="red">${p1(st.oos.mdd)}</td>
      </tr>`;
    }).join('')}
    <tr style="border-top:2px solid var(--gray-400)">
      <td class="L" style="color:var(--gray-600)">SPY</td>
      <td>${p1(d.spy_stats.is.cagr)}</td><td>${p1(d.spy_stats.is.vol)}</td>
      <td>${s2(d.spy_stats.is.sharpe)}</td><td>${s2(d.spy_stats.is.sortino)}</td><td class="red">${p1(d.spy_stats.is.mdd)}</td>
      <td>${p1(d.spy_stats.oos.cagr)}</td><td>${p1(d.spy_stats.oos.vol)}</td>
      <td>${s2(d.spy_stats.oos.sharpe)}</td><td>${s2(d.spy_stats.oos.sortino)}</td><td class="red">${p1(d.spy_stats.oos.mdd)}</td>
    </tr>
    </tbody></table>`;
}

// ── Combined annual returns + attribution table ───────────────────────────────
function combinedTable(d,method,param){
  const ct=d.combined_table, assets=D.assets;
  const years=Object.keys(ct).map(Number).sort();
  const cols=['Blend','SPY',...assets.map(a=>a.toUpperCase()+' (attr)')];
  const header='<tr><th class="L">Year</th>'+cols.map(c=>`<th>${c}</th>`).join('')+'</tr>';
  const rows=years.map(yr=>{
    const row=ct[yr];
    const blend=row.blend, spy=row.spy;
    const cells=[
      `<td style="background:${heatBg(blend)};color:${heatFg(blend)};font-weight:700">${(blend*100).toFixed(1)}%</td>`,
      `<td style="background:${heatBg(spy)};color:${heatFg(spy)}">${(spy*100).toFixed(1)}%</td>`,
      ...assets.map(a=>{const v=row[a+'_c']||0;return`<td style="background:${heatBg(v)};color:${heatFg(v)};font-size:12px">${(v*100).toFixed(1)}%</td>`;})
    ];
    return `<tr><td class="L" style="font-weight:700">${yr}</td>${cells.join('')}</tr>`;
  }).join('');
  return `<div class="hw"><table class="hm"><thead>${header}</thead><tbody>${rows}</tbody></table></div>`;
}

// ── Correlation matrix ────────────────────────────────────────────────────────
function corrMatrix(d){
  const cm=d.corr_matrix, assets=D.assets;
  function cellBg(v){
    const a=Math.abs(v); const sign=v>=0;
    if(a<.1)return'#f9fafb';
    const opacity=Math.min(a,.9);
    return sign?`rgba(13,148,136,${opacity})`:`rgba(220,38,38,${opacity})`;
  }
  const header='<tr><th></th>'+assets.map(a=>`<th>${a.toUpperCase()}</th>`).join('')+'</tr>';
  const rows=assets.map(a=>`<tr><td style="font-weight:700;padding:5px 8px">${a.toUpperCase()}</td>`
    +assets.map(b=>{
      const v=cm[a][b]; const isD=a===b;
      return `<td style="background:${isD?'var(--gray-200)':cellBg(v)};color:${isD?'#666':'#1f2937'};padding:5px 8px;text-align:center;font-weight:600">${isD?'—':v.toFixed(2)}</td>`;
    }).join('')+'</tr>').join('');
  return `<table class="hm" style="font-size:12px"><thead>${header}</thead><tbody>${rows}</tbody></table>`;
}


// ── Weights table ─────────────────────────────────────────────────────────────
// Uses the same param-aware key as the pies/stacked-bar so all three views agree.
function weightsTable(d,method,param){
  const rw=d.regime_weights, regs=d.regimes;
  const key=`${method}_${param}`;
  const assets=D.assets, aL={lv:'LV',mom:'MOM',mr:'MR',spy:'SPY',tbill:'T-Bill'};
  const hd='<tr><th class="L">Asset</th>'+regs.map(r=>`<th>${d.regime_labels[r]||r} (${r})</th>`).join('')+'</tr>';
  const rows=assets.map(a=>`<tr><td class="L">${aL[a]}</td>`
    +regs.map(r=>{const v=rw[r][key][a];return`<td>${v>0.001?p1(v):'—'}</td>`;}).join('')+'</tr>').join('');
  const dist='<tr style="border-top:2px solid var(--gray-200)"><td class="L" style="color:var(--gray-600)">% IS days</td>'
    +regs.map(r=>`<td style="font-size:11px;color:var(--gray-600)">${d.regime_dist[r]}%</td>`).join('')+'</tr>';
  const sh='<tr><td class="L" style="color:var(--gray-600)">Tang. Sharpe</td>'
    +regs.map(r=>`<td>${rw[r].tang_sharpe}</td>`).join('')+'</tr>';
  const vol='<tr><td class="L" style="color:var(--gray-600)">Act. Vol</td>'
    +regs.map(r=>`<td>${rw[r][`act_vol_${key}`]}%</td>`).join('')+'</tr>';
  return `<table class="wt"><thead>${hd}</thead><tbody>${rows}${dist}${sh}${vol}</tbody></table>`;
}

// ── Asset colors ──────────────────────────────────────────────────────────────
const ACLR_PIE = ['#0d9488','#4f46e5','#d97706','#9ca3af','#e5e7eb'];

// ── Draw charts ───────────────────────────────────────────────────────────────
function drawCharts(tk, d, method, param){
  const key=`${method}_${param}`;
  const cv=d.curves[key], dv=d.dd_curves[key];
  const sc=d.spy_curve, sd=d.spy_dd_curve;

  const BLEND_CLR='#0d9488', SPY_CLR='#6366f1', FILL_CLR='rgba(13,148,136,0.18)';

  // ── Equity curve (full width, zoomable, monthly, filled) ─────────────────
  mkZoomLine(tk+'_eq',
    [{label:'Blend',data:cv.nav,borderColor:BLEND_CLR,borderWidth:2.5,pointRadius:0,fill:true,backgroundColor:FILL_CLR},
     {label:'SPY',  data:sc.nav,borderColor:SPY_CLR,  borderWidth:2,  pointRadius:0,fill:false}],
    cv.dates, 'NAV (log scale)', cv.is_end_idx, true, d.regime_runs);

  // ── Drawdown (full width, zoomable) ──────────────────────────────────────
  mkZoomLine(tk+'_dd',
    [{label:'Blend',data:dv.dd,borderColor:BLEND_CLR,borderWidth:2.5,pointRadius:0,fill:true,backgroundColor:FILL_CLR},
     {label:'SPY',  data:sd.dd,borderColor:SPY_CLR,  borderWidth:2,  pointRadius:0,fill:false}],
    dv.dates, 'Drawdown from ATH (%)', dv.is_end_idx, false, d.regime_runs, true);

  // ── Rolling 12m Sharpe (full width, zoomable) ────────────────────────────
  const rs=method==='m1'?d.roll_sharpe_m1:d.roll_sharpe_m4;
  const srs=d.spy_roll_sharpe;
  mkZoomLine(tk+'_rs',
    [{label:'Blend 12m Sharpe',data:rs.sharpe,borderColor:BLEND_CLR,borderWidth:2.5,pointRadius:0,
      fill:{target:'origin',above:'rgba(13,148,136,0.15)',below:'rgba(220,38,38,0.12)'}},
     {label:'SPY',data:srs.sharpe,borderColor:SPY_CLR,borderWidth:2,pointRadius:0,fill:false},
     {label:'Zero',data:rs.dates.map(()=>0),borderColor:'#94a3b8',borderWidth:0.8,pointRadius:0,borderDash:[4,3]}],
    rs.dates, 'Rolling 12m Sharpe', null, false, d.rs_regime_runs);

  // ── Annual returns filled line chart ──────────────────────────────────────
  const ct=d.combined_table;
  const yrs=Object.keys(ct).map(Number).sort().map(String);
  const bYr=yrs.map(y=>ct[y].blend), sYr=yrs.map(y=>ct[y].spy);
  mkChart(tk+'_yrl',{type:'line',data:{labels:yrs,datasets:[
    {label:'Blend',data:bYr,borderColor:BLEND_CLR,borderWidth:2.5,pointRadius:5,pointBackgroundColor:BLEND_CLR,
     fill:{target:'origin',above:'rgba(13,148,136,0.18)',below:'rgba(220,38,38,0.15)'},tension:0.2},
    {label:'SPY',data:sYr,borderColor:SPY_CLR,borderWidth:2,pointRadius:5,pointBackgroundColor:SPY_CLR,fill:false,tension:0.2},
    {label:'Zero',data:yrs.map(()=>0),borderColor:'#94a3b8',borderWidth:0.8,pointRadius:0,borderDash:[3,3]},
  ]},options:{responsive:true,maintainAspectRatio:true,animation:false,
    interaction:{mode:'index',intersect:false},
    plugins:{legend:{position:'top',labels:{boxWidth:10,font:{size:10},usePointStyle:true}},
      zoom:{zoom:{wheel:{enabled:true},pinch:{enabled:true},mode:'x'},pan:{enabled:true,mode:'x'}}},
    scales:{x:{ticks:{font:{size:10}},grid:{display:false}},
            y:{ticks:{font:{size:10},callback:v=>((v*100).toFixed(0)+'%')},
               title:{display:true,text:'Annual Return',font:{size:10}}}}}});

  // ── Regime-by-month stacked area (full width) ───────────────────────────────
  const rbm=d.reg_by_month, regs=d.regimes;
  const RCLR={H:'rgba(13,148,136,0.75)',M:'rgba(217,119,6,0.70)',L:'rgba(220,38,38,0.75)',
               D:'rgba(220,38,38,0.75)',R:'rgba(13,148,136,0.75)',N:'rgba(160,160,160,0.55)'};
  const RCLR_BD={H:'#0d9488',M:'#d97706',L:'#dc2626',D:'#dc2626',R:'#0d9488',N:'#94a3b8'};
  mkChart(tk+'_rby',{type:'bar',
    data:{labels:rbm.dates,datasets:regs.map(reg=>({
      label:(d.regime_labels[reg]||reg)+' ('+reg+')',
      data:rbm[reg],
      backgroundColor:RCLR[reg]||'rgba(150,150,150,0.5)',
      borderColor:RCLR_BD[reg]||'#999',
      borderWidth:0,borderRadius:0}))},
    options:{responsive:true,maintainAspectRatio:true,animation:false,
      interaction:{mode:'index',intersect:false},
      plugins:{legend:{position:'top',labels:{boxWidth:10,font:{size:10},usePointStyle:true}},
        tooltip:{callbacks:{label:ctx=>` ${ctx.dataset.label}: ${ctx.parsed.y.toFixed(0)}%`}}},
      scales:{
        x:{stacked:true,ticks:{maxTicksLimit:15,font:{size:9}},grid:{display:false}},
        y:{stacked:true,ticks:{font:{size:9},callback:v=>v+'%'},max:100,
           title:{display:true,text:'% of trading days',font:{size:9}}}
      }}});

  // ── Monthly strategy weights stacked bar ─────────────────────────────────
  const wtm=d.wt_by_month[key], aLabels={lv:'LV',mom:'MOM',mr:'MR',spy:'SPY',tbill:'T-Bill'};
  const ACLR2={lv:'rgba(13,148,136,0.80)',mom:'rgba(79,70,229,0.80)',mr:'rgba(217,119,6,0.80)',
               spy:'rgba(148,163,184,0.70)',tbill:'rgba(226,232,240,0.80)'};
  const ABCLR={lv:'#0d9488',mom:'#4f46e5',mr:'#d97706',spy:'#94a3b8',tbill:'#cbd5e1'};
  mkChart(tk+'_wts',{type:'bar',
    data:{labels:rbm.dates,datasets:D.assets.map(a=>({
      label:aLabels[a],
      data:wtm[a],
      backgroundColor:ACLR2[a]||'rgba(150,150,150,0.6)',
      borderColor:ABCLR[a]||'#999',
      borderWidth:0,borderRadius:0}))},
    options:{responsive:true,maintainAspectRatio:true,animation:false,
      interaction:{mode:'index',intersect:false},
      plugins:{legend:{position:'top',labels:{boxWidth:10,font:{size:10},usePointStyle:true}},
        tooltip:{callbacks:{label:ctx=>` ${ctx.dataset.label}: ${ctx.parsed.y.toFixed(0)}%`}}},
      scales:{
        x:{stacked:true,ticks:{maxTicksLimit:15,font:{size:9}},grid:{display:false}},
        y:{stacked:true,ticks:{font:{size:9},callback:v=>v+'%'},max:100,
           title:{display:true,text:'% allocated',font:{size:9}}}
      }}});

    // ── Pie charts: IS regime weights per regime (one per regime) ─────────────
  // Use the same param-aware key as the stacked-bar weights, so the pies always
  // match the currently-selected Kelly fraction / vol multiple.
  const rw=d.regime_weights;
  regs.forEach(reg=>{
    const w=rw[reg][key];
    const vals=D.assets.map(a=>Math.max(0,w[a]||0));
    const labels=D.assets.map(a=>({lv:'LV',mom:'MOM',mr:'MR',spy:'SPY',tbill:'T-Bill'}[a]));
    // filter out zeros
    const fv=[],fl=[],fc=[];
    vals.forEach((v,i)=>{if(v>0.005){fv.push(v);fl.push(labels[i]);fc.push(ACLR_PIE[i]);}});
    mkChart(tk+'_pie_'+reg,{type:'doughnut',
      data:{labels:fl,datasets:[{data:fv,backgroundColor:fc,borderWidth:2,borderColor:'#fff',hoverOffset:6}]},
      options:{responsive:true,maintainAspectRatio:true,animation:false,
        cutout:'55%',
        plugins:{legend:{position:'bottom',labels:{boxWidth:10,font:{size:10},usePointStyle:true}},
          tooltip:{callbacks:{label:ctx=>`${ctx.label}: ${(ctx.parsed*100).toFixed(1)}%`}}}}});
  });
}

// ── Tab state ─────────────────────────────────────────────────────────────────

      <div class="cc cc-wide">
        <div style="display:flex;justify-content:space-between;align-items:baseline">
          <h3>Equity Curve <span style="font-size:10px;color:var(--gray-400);font-weight:400">(log scale, NAV starts at 1)</span></h3>

        <canvas id="${tk}_eq"></canvas>
      </div>
    </div>
    <div class="cg1">
      <div class="cc cc-wide">
        <div style="display:flex;justify-content:space-between;align-items:baseline">
          <h3>Drawdown from All-Time High</h3>
          <button class="reset-btn" onclick="resetZoom('${tk}_dd')">Reset Zoom</button>
        </div>
        <div class="cc-sub">Scroll to zoom &nbsp;·&nbsp; Drag to pan</div>
        <canvas id="${tk}_dd"></canvas>
      </div>
    </div>
    <div class="cg1">
      <div class="cc cc-wide">
        <div style="display:flex;justify-content:space-between;align-items:baseline">
          <h3>Rolling 12-Month Sharpe Ratio</h3>
          <button class="reset-btn" onclick="resetZoom('${tk}_rs')">Reset Zoom</button>

        <div class="cc-sub">Scroll to zoom &nbsp;·&nbsp; Drag to pan</div>
        <canvas id="${tk}_rs"></canvas>
      </div>
    </div>
    <div class="sec">Regime Allocation <span class="sub">${s.method==='m1'?`M1 @ ${s.kelly}% Kelly`:`M4 @ ${(s.vol/100).toFixed(2)}× vol`} — IS optimal weights per regime</span></div>

            <span style="font-size:10px;color:var(--gray-400);font-weight:400;margin-left:6px">
              Tang Sh ${d.regime_weights[reg].tang_sharpe} &nbsp;·&nbsp;

    <div class="cg2">
      <div class="cc"><h3>Regime Mix by Month <span style="font-size:10px;color:var(--gray-400);font-weight:400">(% trading days)</span></h3><canvas id="${tk}_rby"></canvas></div>

        ${weightsTable(d,s.method,param)}
      </div>
    </div>

  setTimeout(()=>drawCharts(tk,d,s.method,param),10);
}

function setM(tk,m){S[tk].method=m;render(tk);}
function setP(tk,m,v){S[tk].method=m;if(m==='m1')S[tk].kelly=v;else S[tk].vol=v;render(tk);}
function sw(name){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',['hml','drn'][i]===name));
  document.querySelectorAll('.tp').forEach(p=>p.classList.remove('active'));
  document.getElementById(name==='hml'?'ph':'pd').classList.add('active');
  render(name);
}

document.getElementById('dl').innerHTML=`Report: ${D.current_date}<br>Data: ${D.hml.data_start} → ${D.hml.data_end}`;
document.getElementById('stamp').innerHTML=`Generated: <b>${D.generated_at}</b> &nbsp;·&nbsp; Author: <b>${D.author}</b>`;

  document.getElementById('params-body').textContent=lines.join('\n');
  // toggle triangle on open/close
  const det=document.getElementById('params-panel');

render('hml');
