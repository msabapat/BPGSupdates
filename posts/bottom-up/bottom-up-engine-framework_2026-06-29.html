 <p>Picking a handful of companies that compound 10×–1000× after they go public · companion to the macro Regime Meta-Engine · v3 · 2026-06-26</p>

const G = {
 ROIC:"Return on invested capital — the % a business earns on every dollar it puts to work. High and <b>rising</b> ROIC is the engine of compounding.",
 TAM:"Total Addressable Market — the total yearly revenue if the company captured 100% of its market. Big TAM ÷ small company = long runway.",
 Runway:"How many years a company can keep reinvesting at high returns before it saturates its market. Roughly TAM ÷ today's revenue. The make-or-break multibagger filter.",
 NRR:"Net Revenue Retention — what last year's customers spend this year. Above 100% means they spend <b>more</b> even before new customers are added — a strong lock-in signal.",
 CAC:"Customer Acquisition Cost — what it costs to win one new customer. <b>Falling</b> CAC as you grow is a network-effect fingerprint.",
 SSS:"Same-Store Sales — growth from existing locations, stripping out new openings. The cleanest read on a retail/restaurant flywheel.",
 moat:"The durable, structural reason competitors can't catch up. We call it a <b>Barrier</b>. Eight types are catalogued in the Moats tab.",
 multiple:"The valuation the market pays (e.g. price-to-earnings). The one term in the equation we don't control — never bet on it re-rating up.",
 T1:"Type-I error — a <b>false alarm</b>: it looked like a great company but failed. Clusters in bubbles and stories-without-a-moat.",
 T2:"Type-II error — a <b>missed winner</b>: it was easy to dismiss (boring, foreign, unprofitable, 'expensive') but soared. The dominant error for a multibagger hunter.",
 reflexivity:"Soros's idea that a story can <b>create</b> the reality it predicts — a company raises cheap money on a narrative and uses it to build real advantages.",
 counterpos:"Counter-positioning — you do business in a way the incumbent <b>can't copy without wrecking its own model</b> (Netflix vs Blockbuster). Detectable by pure reasoning, day one.",
 Builder:"The founder/management engine that <b>creates, stacks and renews</b> moats over time. Not a moat itself — the moat-maker. Judged carefully (Guard B).",
 Barrier:"A structural moat — a wall that exists whether or not management is brilliant. The eight types in the Moats tab.",
 lift:"How much more common a feature is in winners than in the look-alike losers. A feature with zero lift describes greatness but doesn't <b>predict</b> it.",
 stack:"Moat stacking — the biggest baggers have 3–4 reinforcing moats (Apple = ecosystem + brand + switching + scale). Stack count is itself a quality signal.",
 Dir:"Moat <b>direction</b> — is the advantage widening (+), flat (0) or narrowing (−)? The single most decisive column. Losers usually had a moat; it was narrowing.",
 Detect:"Was the edge actually visible <b>in real time</b>, or only obvious in hindsight? A '−' here means you couldn't have known — a frenzy/T1 setup.",
 Surv:"Survival / capacity to suffer — can it fund the long wait through drawdowns, via cash or cheap access to capital? Amazon-2001's decisive variable.",
 Sig:"Signature — customer pull visible before profits: retention, NRR, engagement density, pricing power. The only read on pre-profit companies."

V.overview = `
<h2 class="vh">The core idea — and the one equation</h2>
<p class="vsub">What actually makes a 10×–1000× company, in one mechanism.</p>
<p class="lede">A multibagger reinvests a lot of its cash at a high rate of return, for a very long time, behind a competitive advantage that is <b>getting stronger</b> — bought <b>before</b> the market priced that in, and held through two or three gut-wrenching drawdowns.</p>
<p>The <b>mechanism is timeless</b>; what it <i>looks like</i> changes by era. This is why Benjamin Graham is the wrong model — "buy cheap" is built to avoid losses and structurally <b>caps</b> upside. The right lineage is Fisher → Munger → late Buffett → Lynch → Sleep → Thiel. And the greatest future companies are often <b>loss-making today</b>, so we must read the <i>signs</i> of advantage before the profits (tab 3).</p>
<pre> Total stock return (over holding period):

   ≈  [ ROIC × reinvestment rate ]^years   ×   exit multiple
                                            ÷   entry multiple
                                            ÷   cumulative dilution

   RUNWAY   =  how many years of high-ROIC reinvestment remain (the make-or-break filter)
   MOAT     =  the barrier that stops ROIC from being competed away (prerequisite)
   multiple =  the market's valuation (P/E or EV/EBITDA) — the one term we cannot engineer</pre>
<div class="callout"><b>Reading the equation:</b> ${gl("ROIC","ROIC")} × reinvestment rate = annual EPS growth. Compounded over <b>n years</b> of ${gl("Runway","runway")}, that is the intrinsic value created. Multiply by how the market re-rates the stock (exit ÷ entry ${gl("multiple","multiple")}), divide by any share count growth (dilution). A ${gl("moat","moat")} is not a factor in the equation — it is the reason ROIC stays high long enough for the compounding to matter.</div>
<h3>Three rules that fall straight out of the equation</h3>
<ul>
<li><b>A moat alone is not enough.</b> The moat protects the <i>return</i>; the bagger comes from return × reinvestment × runway. A fortress in a tiny market is a <b>value trap</b>.</li>
<li><b>Don't pay for the future twice.</b> Cisco-2000 was a great company and a ruinous stock — the price had already baked in 20 years of growth.</li>
<li><b>Dilution can eat the gain.</b> Raising money on a story is fine <i>only if</i> it builds the moat faster than it dilutes (Tesla yes, most SPACs no).</li>
</ul>
<div class="key"><b>Hand-off to the macro engine.</b> The bottom-up engine picks <i>what</i> could compound; the macro Regime Meta-Engine sets <i>which style</i> the era favors and <i>how much</i> to own (tab 10–11).</div>`;

].map(r=>`<tr><td><b>${r[0]}</b></td><td>${r[1]}</td><td>${r[2]}</td><td class="conn">${r[3]}</td></tr>`).join("")}

V.signatures = `
<h2 class="vh">Signatures of greatness — the signs <i>before</i> the profits</h2>
<p class="vsub">A loss-making company has a silent income statement — but greatness leaves fingerprints years earlier. Most are early signs of a moat <b>forming</b>.</p>
<table><thead><tr><th>Signature</th><th>In plain English</th><th>The moat it foreshadows</th><th>What you can watch</th><th>The look-alike that fools you</th></tr></thead><tbody>
${[
["Power before profit","Winning customers/share faster than money","Network or scale moat forming",`Users getting <i>more</i> engaged; customers staying; ${gl("CAC","CAC")} <i>falling</i>`,"A one-sided 'network' that churns (Groupon)"],
["Reflexive flywheel","Raises cheap money on a story, turns it into hard assets","A moat being built with others' money","Capital raised → real factories/code; hype-vs-reality gap closing","A story that never becomes anything (Nikola, WeWork)"],
["Talent &amp; capital magnet","Best people and cheapest money flow in","A strong Builder","A-player hires; oversubscribed raises; a founder others bet on","Charisma that raises money but builds nothing"],

V.lens = `
<h2 class="vh">The Firm Lens — the eight things to examine in any company</h2>
<p class="vsub">You can't judge a moat in isolation. Some layers are <span class="pill f">FILTER</span> knock-outs (fail = out); others are <span class="pill s">SCORE</span> graded ratings. Knowing which is the difference between a screen and a wish-list.</p>
<table><thead><tr><th>#</th><th>Layer</th><th>What we ask</th><th>Filter or Score?</th></tr></thead><tbody>
${[
["1","Unit economics / returns",`Does each dollar invested earn a high, <i>rising</i> ${gl("ROIC","return")}?`,'<span class="pill s">SCORE</span> (knock out only if negative with no path up)'],
["2","Runway / TAM",`Is the market <i>vastly</i> bigger than the company today?`,'<span class="pill f">FILTER</span> then <span class="pill s">SCORE</span>'],
["3","Moat",`What stops a rival catching up — and is it <i>widening</i>?`,'<span class="pill s">SCORE</span> (direction is key)'],
["4","The Builder",`Owner-operator who reinvests wisely, with skin in the game?`,'<span class="pill s">SCORE</span> (with Guard B)'],
["5","Industry structure",`Is this even a <i>good business to be in</i>? (Porter)`,'<span class="pill f">FILTER</span> (a bad pond caps everything)'],
["6","Era / regime fit",`Does the moment in history favor this kind of company?`,'<span class="pill c">CONDITIONS the size</span> (tab 10–11)'],
["7","Price vs expectations",`Has the market <i>already</i> priced the dream?`,'<span class="pill f">FILTER at extremes</span> (the Cisco gate)'],
["8","Decay / sell signals",`Is the advantage breaking down?`,'<span class="pill c">SELL trigger</span>, not a buy (tab 9D)']
].map(r=>`<tr><td><b>${r[0]}</b></td><td><b>${r[1]}</b></td><td>${r[2]}</td><td>${r[3]}</td></tr>`).join("")}
</tbody></table>
<h3>What is ${gl("TAM","TAM")}, and why Runway is the make-or-break filter</h3>
<p><b>TAM = Total Addressable Market</b> — the total yearly revenue if the company captured <b>100%</b> of its market. <b>${gl("Runway","Runway")}</b> ≈ TAM ÷ today's revenue — how many times over it can keep growing. This is the single most important multibagger filter, because the equation (tab 1) needs a market to grow into for 10–20 years.</p>
<div class="two">
<div class="card"><h4>✅ Walmart, 1972</h4><p style="font-size:13px">Tiny revenue; gigantic US-retail TAM → enormous runway → a ~1000-bagger over 30+ years.</p></div>
<div class="card"><h4>✅ Nvidia, 2016</h4><p style="font-size:13px">Gaming TAM was limited; then datacenter/AI TAM exploded — the runway <i>expanded mid-journey</i>. (TAM can grow.)</p></div>
<div class="card" style="border-top-color:var(--red)"><h4>❌ Great business, small TAM</h4><p style="font-size:13px">A beloved regional chain or niche component maker — real moat, great returns, but little room to grow. A good stock, not a multibagger.</p></div>
</div>
<div class="key"><b>So, filter or score?</b> <span class="pill f">Filter</span> first &amp; cheaply: Runway/TAM, industry, price. <span class="pill s">Score</span> the survivors: returns, moat (esp. direction), Builder. <span class="pill c">Condition</span> the size by era. <b>Sell-only:</b> decay signals. → <i>Filter on runway &amp; pond, score on moat-direction × returns × Builder, never pay through the price gate, let the era set the size.</i></div>`;

V.moats = `
<h2 class="vh">Builder vs Barrier — and the moat catalogue</h2>
<p class="vsub">Layers 3 &amp; 4 of the Firm Lens are the heart of the engine — and constantly confused. We name them, then catalogue the Barriers.</p>
<div class="two">
<div class="card"><h4>${gl("Barrier","Barrier")} — the moat</h4><p style="font-size:13px">A <b>structural</b> reason rivals can't erode the economics — a wall that exists whether or not management is brilliant. Firm-Lens layer 3; catalogued below.</p></div>
<div class="card" style="border-top-color:var(--green)"><h4>${gl("Builder","The Builder")} — the moat-maker</h4><p style="font-size:13px">The founder/management engine that <b>creates, stacks &amp; renews</b> moats. Amazon's "driver excellence" is the Builder — <i>not</i> a moat. It produced Amazon's barriers (scale + ecosystem).</p></div>
</div>
<h3>Why separate them? You analyze, hold &amp; sell each completely differently</h3>
<table><thead><tr><th></th><th>If the edge is a BARRIER</th><th>If the edge is the BUILDER (no deep moat yet)</th></tr></thead><tbody>
<tr><td><b>Betting on</b></td><td>The <i>structure</i> persists</td><td>A <i>person/team</i> keeps creating advantage</td></tr>
<tr><td><b>You examine</b></td><td>Moat direction, who the attacker is, the regime</td><td>Track record, incentives, insider ownership, Guard B</td></tr>
<tr><td><b>Main risk</b></td><td>The moat quietly narrows (Intel, Nokia)</td><td>Key-person risk; the magic doesn't repeat</td></tr>
<tr><td><b>Sell trigger</b></td><td>Moat direction flips negative</td><td>Founder exit; allocation drifts; flywheel stops</td></tr>
<tr><td><b>Position size</b></td><td>Size up as the moat proves durable</td><td>Size smaller; demand the flywheel be <i>converting</i></td></tr>
</tbody></table>
<div class="callout"><b>The decisive insight:</b> the best companies have <b>both</b> — a Builder who has <i>already</i> stacked multiple Barriers (Amazon, Apple, Nvidia). A pure-Builder bet with no emerging Barrier is the most fragile thing we can own; a strong Barrier with a weak Builder compounds but won't renew across the next S-curve (Intel).</div>
<h3>The Moat Taxonomy — eight Barriers + the Builder (and how early we can spot each)</h3>
<table><thead><tr><th>#</th><th>Moat</th><th>Examples</th><th>What you watch for it</th><th>See it early?</th><th>The trap</th></tr></thead><tbody>
${[
["M1","Proprietary IP / Technology","Novo (GLP-1), drug patents, ARM","Patent dates, trial data, a performance lead",["Yes","up"],"A patent with no market behind it"],
["M1b","Cornered Resource","ASML (sole EUV maker), rare talent/deposits","Being the <i>only</i> supplier of a scarce input",["Yes","up"],"The scarce thing becomes common"],
["M2","Network Effects",`Meta, Visa, Booking, MercadoLibre`,`Engagement getting denser; ${gl("CAC","CAC")} falling; high retention`,["Yes — but most never tip","mid"],"A thin, one-sided 'network' that churns"],
["M3","Scale / Cost (incl. 'shared')","Walmart, Costco, Amazon, TSMC",`Lower unit costs as volume grows; ${gl("SSS","SSS")} gains`,["Partly","mid"],"Big, but no real cost advantage"],
["M4","Switching Costs / Lock-in","Microsoft, Adobe, Oracle, CrowdStrike",`Customers expanding spend; very low churn (${gl("NRR","NRR")}>100%)`,["Yes","up"],"'Sticky' in theory but customers leave"],
["M5","Brand / Habit","Coca-Cola, Nike, Apple, LVMH, Monster","Charging more than rivals and still selling",["Slow","mid"],"A fad mistaken for a brand (LA Gear)"],
["M6",gl("counterpos","Counter-positioning"),"Netflix, Costco, Vanguard, Tesla, Amazon","Would copying you wreck the incumbent's own model?",["Earliest of all","up"],"The incumbent actually <i>can</i> respond"],
["M7","Process (operational excellence)","Toyota (lean), Amazon ops, Domino's","A durable, unclosable gap in quality/cost/speed",["Slow","mid"],"A process rivals can simply copy"],
["M8","Regulatory / Political","Tesla (credits), SpaceX, defense, utilities","Contracts, subsidies, scarce licenses",["Yes — durability uncertain","mid"],"The subsidy/license <b>reverses</b> (Alibaba)"],
["B","The Builder (moat-<i>maker</i>)","Bezos, Buffett, Musk, Huang, Arnault","Capital-allocation record, insider ownership",["Partly","mid"],"A promoter who builds nothing"]
].map(r=>`<tr><td><b>${r[0]}</b></td><td><b>${r[1]}</b></td><td>${r[2]}</td><td>${r[3]}</td><td><span class="tag ${r[4][1]}">${r[4][0]}</span></td><td>${r[5]}</td></tr>`).join("")}
</tbody></table>
<div class="key"><b>Early-detection takeaway.</b> Spot early &amp; reliably: <b>M1/M1b</b> (patents, sole-supplier), <b>M4</b> (one retention number), <b>M6</b> (a day-one logic puzzle — most under-used), <b>M8</b> (public contracts*). <b>M2</b> is detectable but dangerous. <b>M3/M5/M7</b> are real but slow — so act on the <b>Builder + counter-positioning</b> before the financials prove it.</div>
<h3>How the foundation (tabs 1–4) changes the way we read a moat — the "grammar"</h3>
<ol>
<li><b>Moat × Runway is the unit, never moat alone</b> — a fortress over a saturated market is a sell.</li>
<li><b>A moat only counts against a <i>named attacker</i></b> (Christensen) — Kodak's film moat was useless vs digital.</li>
<li><b>Moat <i>direction</i> depends on the era</b> (Arthur/Perez) — it widens on its own in a tipping market, narrows in a maturing one.</li>
<li><b>There's a moat <i>above</i> the company — the industry</b> (Porter) — bad pond → capped score.</li>

<li><b>The tab-3 signatures ARE the moat early-warning system.</b></li>
<li><b>The same moat means different things at different life stages.</b></li>
<li><b>Every moat gets an AI-durability tag</b> (tab 12).</li>
</ol>
<p class="conn">Net: a moat is read as moat × runway, against a named attacker, with a direction set by the era, a build-state, the signatures as the early sensor, and an AI-durability tag.</p>`;

<h2 class="vh">From scores to decisions — how we actually use this</h2>
<p class="vsub">The scoring isn't an end in itself. Reading down the matched-loser columns (Guard A at work), four decisions emerge.</p>
<div class="key"><b>The big finding first.</b> <i>Having</i> a moat barely separates winners from losers — <b>the losers had moats too.</b> What actually separated them: <b>moat direction</b>, <b>runway</b>, <b>survival</b>, and <b>the Builder</b>. Those four carry the weight.</div>
<div class="two">
<div class="card" style="border-top-color:var(--green)"><h4>① BUY when</h4><p style="font-size:13px">It clears the filters (big runway, decent industry, not over-priced) <i>and</i> scores well on the discriminators: <b>moat widening + long runway + can survive + strong Builder + visible signatures</b>. Cheap early reads: ${gl("counterpos","counter-positioning")} (M6) and ${gl("NRR","retention")} (M4).</p></div>
<div class="card" style="border-top-color:var(--red)"><h4>② AVOID (the ${gl("T1","T1")} traps)</h4><p style="font-size:13px">A story without a moat, especially in a frenzy. This is where the <b>macro engine earns its keep</b>: when it says 'bubble,' raise the bar and shrink size — the false-alarm rate is high.</p></div>
<div class="card" style="border-top-color:var(--amber)"><h4>③ SELL when</h4><p style="font-size:13px">Any decay signal fires (tab 9D): <b>moat direction flips, runway exhausted, price has priced the dream, or the founder leaves.</b> Selling is its own discipline.</p></div>
<div class="card"><h4>④ SIZE by</h4><p style="font-size:13px">Macro regime × the company's life stage (below): lean into exponentials in a frenzy <i>but cap the downside</i>; lean into proven compounders in a high-rate golden age.</p></div>
</div>
<div class="key"><b>In one sentence:</b> filter on runway &amp; pond, score on moat-direction × Builder × survival, never buy through the price gate, sell when the moat turns, and let the macro engine set the size.</div>
<h3>11 · How much to own, and when — style × life-stage × macro</h3>
<p><b>Dial 1 — style:</b> traditional cash-compounders (Buffett-style) vs non-traditional exponentials (Tesla, early Nvidia/Amazon). We want both, in shifting proportions.</p>
<p><b>Dial 2 — life stage:</b> emergence → frenzy → scaling → golden age → maturity → <b>decay</b>. The <i>same company</i> moves along this line — Apple was near-bankrupt in 1996 and the most valuable company on earth later — so weight tracks the <i>stage</i>, not just the name.</p>
<pre>position size = (what the macro regime favors) x (where the company is in its life stage)</pre>
<p class="conn">In a cheap-money frenzy: tilt to exponentials but cap how much you can lose. In a high-rate golden age: tilt to proven compounders and the survivors of the last frenzy. The explicit hand-off to the macro Regime Meta-Engine.</p>`;
