<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BPGS Updates</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f1f5f9;color:#1e293b;font-size:14px;min-height:100vh}
.header{background:#fff;border-bottom:1px solid #e2e8f0;padding:18px 0;margin-bottom:32px}
.header-inner{max-width:820px;margin:0 auto;padding:0 24px;display:flex;align-items:baseline;gap:12px}
.logo{font-size:20px;font-weight:700;color:#0f172a;letter-spacing:-0.3px}
.logo span{color:#4f46e5}
.tagline{font-size:12px;color:#94a3b8}
.page{max-width:820px;margin:0 auto;padding:0 24px 48px}
.section-label{font-size:11px;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.7px;margin-bottom:16px}
.post-list{display:flex;flex-direction:column;gap:12px}
.post-card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:18px 20px;display:flex;align-items:flex-start;justify-content:space-between;gap:16px;box-shadow:0 1px 3px rgba(0,0,0,.04);transition:border-color .15s,box-shadow .15s}
.post-card:hover{border-color:#c7d2fe;box-shadow:0 2px 8px rgba(79,70,229,.08)}
.post-meta{flex:1;min-width:0}
.post-date{font-size:11px;font-weight:600;color:#94a3b8;margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
.post-title{font-size:15px;font-weight:700;color:#0f172a;margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.post-summary{font-size:13px;color:#64748b;line-height:1.5}
.post-author{font-size:11px;color:#a5b4fc;margin-top:6px;font-weight:600}
.view-btn{flex-shrink:0;padding:7px 16px;background:#4f46e5;color:#fff;border-radius:7px;font-size:12px;font-weight:600;text-decoration:none;white-space:nowrap;transition:background .15s}
.view-btn:hover{background:#4338ca}
.empty{text-align:center;padding:60px 20px;color:#94a3b8}
.empty-icon{font-size:36px;margin-bottom:12px}
</style>
</head>
<body>
<div class="header">
  <div class="header-inner">
    <div class="logo">BPGS<span>.</span>Updates</div>
    <div class="tagline">Quantitative Strategy Research</div>
  </div>
</div>
<div class="page">
  <div class="section-label">Latest Updates</div>
  {% if posts %}
  <div class="post-list">
    {% for post in posts %}
    <div class="post-card">
      <div class="post-meta">
        <div class="post-date">{{ post.date }}</div>
        <div class="post-title">{{ post.title }}</div>
        <div class="post-summary">{{ post.summary }}</div>
        {% if post.author %}
        <div class="post-author">— {{ post.author }}</div>
        {% endif %}
      </div>
      <a class="view-btn" href="/posts/{{ post.file }}" target="_blank">View →</a>
    </div>
    {% endfor %}
  </div>
  {% else %}
  <div class="empty">
    <div class="empty-icon">📊</div>
    <div>No updates yet.</div>
  </div>
  {% endif %}
</div>
</body>
</html>
